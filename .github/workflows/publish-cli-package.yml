name: Publish CLI to GitHub Packages

on:
  push:
    branches:
      - main
    paths:
      - 'cli/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          PREV_VERSION=$(git show HEAD^:cli/package.json 2>/dev/null | node -p 'JSON.parse(require("fs").readFileSync(0, "utf8")).version' || echo "")
          CURR_VERSION=$(node -p 'require("./cli/package.json").version')
          if [ "$PREV_VERSION" = "$CURR_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURR_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup-node-env
        if: steps.version.outputs.changed == 'true'
        with:
          registry-url: 'https://npm.pkg.github.com'
          scope: '@paulelian-tabarant'

      - name: Build CLI
        if: steps.version.outputs.changed == 'true'
        run: pnpm --filter ./cli build

      - name: Publish @paulelian-tabarant/ripe
        if: steps.version.outputs.changed == 'true'
        run: pnpm --filter ./cli publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "cli-v${{ steps.version.outputs.version }}" --title "cli-v${{ steps.version.outputs.version }}" --notes ""
