name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-api: ${{ github.event_name == 'workflow_dispatch' || steps.classify-changes.outputs.api == 'true' || steps.classify-changes.outputs.shared == 'true' }}
      run-cli: ${{ github.event_name == 'workflow_dispatch' || steps.classify-changes.outputs.cli == 'true' || steps.classify-changes.outputs.shared == 'true' }}
      run-web: ${{ github.event_name == 'workflow_dispatch' || steps.classify-changes.outputs.web == 'true' || steps.classify-changes.outputs.shared == 'true' }}
      run-md: ${{ github.event_name == 'workflow_dispatch' || steps.classify-changes.outputs.md == 'true' || steps.classify-changes.outputs.shared == 'true' }}
      run-workflows: ${{ github.event_name == 'workflow_dispatch' || steps.classify-changes.outputs.workflows == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/classify-changes
        id: classify-changes
        with:
          base: ${{ github.event.pull_request.base.ref || 'main' }}

  actionlint:
    needs: changes
    if: needs.changes.outputs.run-workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1

  static-checks-md:
    needs: changes
    if: needs.changes.outputs.run-md == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint markdown
        run: pnpm lint:md

  static-checks-api:
    needs: changes
    if: needs.changes.outputs.run-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint api
        run: pnpm --filter api lint

      - name: Typecheck api
        run: pnpm --filter api typecheck

  static-checks-cli:
    needs: changes
    if: needs.changes.outputs.run-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint cli
        run: pnpm --filter ./cli lint

      - name: Typecheck cli
        run: pnpm --filter ./cli typecheck

  static-checks-web:
    needs: changes
    if: needs.changes.outputs.run-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint web
        run: pnpm --filter web lint

      - name: Typecheck web
        run: pnpm --filter web typecheck

  test-api:
    needs: changes
    if: needs.changes.outputs.run-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Test api
        run: pnpm --filter api test
        env:
          DATABASE_PATH: /tmp/test.db

  test-cli:
    needs: changes
    if: needs.changes.outputs.run-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Test cli
        run: pnpm --filter ./cli test

  test-web:
    needs: changes
    if: needs.changes.outputs.run-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Test web
        run: pnpm --filter web test

  deploy-staging:
    needs: [actionlint, static-checks-md, static-checks-api, static-checks-cli, static-checks-web, test-api, test-cli, test-web]
    if: |
      always() &&
      contains(github.event.pull_request.labels.*.name, 'deploy-staging') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit
