name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run-api: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.api == 'true' || steps.filter.outputs.shared == 'true' }}
      run-cli: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.cli == 'true' || steps.filter.outputs.shared == 'true' }}
      run-md: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.md == 'true' || steps.filter.outputs.shared == 'true' }}
      run-workflows: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.workflows == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.pull_request.base.ref || 'main' }}
          filters: |
            shared:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'biome.json'
              - '.github/actions/**'
              - '.github/workflows/ci-pr.yml'
            api:
              - 'api/**'
            cli:
              - 'cli/**'
            md:
              - '**/*.md'
            workflows:
              - '.github/**'

  actionlint:
    needs: changes
    if: needs.changes.outputs.run-workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: reviewdog/action-actionlint@v1

  static-checks-md:
    needs: changes
    if: needs.changes.outputs.run-md == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint markdown
        run: pnpm lint:md

  static-checks-api:
    needs: changes
    if: needs.changes.outputs.run-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint api
        run: pnpm --filter api lint

      - name: Typecheck api
        run: pnpm --filter api typecheck

  static-checks-cli:
    needs: changes
    if: needs.changes.outputs.run-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Lint cli
        run: pnpm --filter ./cli lint

      - name: Typecheck cli
        run: pnpm --filter ./cli typecheck

  test-api:
    needs: changes
    if: needs.changes.outputs.run-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Test api
        run: pnpm --filter api test
        env:
          DATABASE_PATH: /tmp/test.db

  test-cli:
    needs: changes
    if: needs.changes.outputs.run-cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-env
      - name: Test cli
        run: pnpm --filter ./cli test

  deploy-staging:
    needs: [actionlint, static-checks-md, static-checks-api, static-checks-cli, test-api, test-cli]
    if: |
      always() &&
      contains(github.event.pull_request.labels.*.name, 'deploy-staging') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    uses: ./.github/workflows/deploy-staging.yml
    secrets: inherit
